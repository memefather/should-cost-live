<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHOULD-COST LIVE // NEURAL SOURCING ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #020617; color: #f1f5f9; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 243, 255, 0.2); }
        .neon-text { text-shadow: 0 0 10px #00f3ff; }
        .input-dark { background: #000 !important; border: 1px solid #334155 !important; color: white !important; padding: 8px; border-radius: 4px; font-size: 11px; }
        .btn-neon { border: 1px solid #00f3ff; color: #00f3ff; padding: 4px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase; }
        .btn-neon:hover { background: #00f3ff; color: #000; }
        .row-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 8px; }
        .search-results { position: absolute; z-index: 50; width: 100%; background: #000; border: 1px solid #00f3ff; max-height: 150px; overflow-y: auto; }
        .search-item { padding: 8px; cursor: pointer; font-size: 10px; border-bottom: 1px solid #111; }
        .search-item:hover { background: #00f3ff; color: #000; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-cyan-500/30 pb-4">
            <div>
                <h1 class="text-3xl font-bold orbitron neon-text uppercase">SHOULD-COST <span class="text-cyan-400">LIVE</span></h1>
                <p class="text-[10px] tracking-[0.3em] uppercase text-cyan-600">Autonomous Procurement Protocol</p>
            </div>
            <div class="text-right hidden md:block">
                <span class="text-[10px] text-cyan-400 animate-pulse uppercase font-bold">● Neural Link Active</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- INPUTS -->
            <div class="lg:col-span-5 space-y-6">
                <!-- MATERIALS -->
                <section class="glass p-6 rounded-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs orbitron uppercase text-cyan-400">BOM [Materials]</h3>
                        <button onclick="addMaterialRow()" class="btn-neon">+ Part</button>
                    </div>
                    <div id="matContainer" class="space-y-4"></div>
                </section>

                <!-- PROCESSES -->
                <section class="glass p-6 rounded-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs orbitron uppercase text-pink-400">Fab [Processes]</h3>
                        <button onclick="addProcessRow()" class="btn-neon" style="border-color:#ff00f7;color:#ff00f7">+ Step</button>
                    </div>
                    <div id="procContainer" class="space-y-4"></div>
                </section>

                <!-- LABOR -->
                <section class="glass p-6 rounded-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs orbitron uppercase text-green-400">Human [Labor]</h3>
                        <button onclick="addLaborRow()" class="btn-neon" style="border-color:#39ff14;color:#39ff14">+ Role</button>
                    </div>
                    <div id="labContainer" class="space-y-4"></div>
                </section>

                <!-- LOGISTICS -->
                <section class="glass p-6 rounded-lg bg-amber-500/5">
                    <h3 class="text-xs orbitron uppercase text-amber-400 mb-4">Logistics</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <label class="text-[9px] uppercase text-slate-500 block mb-1">Origin City</label>
                            <input type="text" id="originInp" class="w-full input-dark" oninput="doSearch(this, 'orig')" value="Shenzhen, China">
                            <div id="origResults" class="search-results hidden"></div>
                        </div>
                        <div class="relative">
                            <label class="text-[9px] uppercase text-slate-500 block mb-1">Dest City</label>
                            <input type="text" id="destInp" class="w-full input-dark" oninput="doSearch(this, 'dest')" value="Austin, USA">
                            <div id="destResults" class="search-results hidden"></div>
                        </div>
                        <div>
                            <label class="text-[9px] uppercase text-slate-500 block mb-1">Mode</label>
                            <select id="shipMode" class="w-full input-dark" onchange="runCalc()">
                                <option value="boat">Ocean</option>
                                <option value="air">Air</option>
                                <option value="truck">Truck</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] uppercase text-slate-500 block mb-1">Tariff %</label>
                            <input type="number" id="tRate" class="w-full input-dark" value="10" oninput="runCalc()">
                        </div>
                    </div>
                </section>

                <!-- QUOTE -->
                <div class="glass p-6 rounded-lg border-l-4 border-cyan-400">
                    <label class="text-[10px] text-slate-500 uppercase block mb-1">Supplier Quote ($)</label>
                    <input type="number" id="sQuote" class="w-full input-dark text-xl font-bold" value="5000" oninput="runCalc()">
                </div>
            </div>

            <!-- OUTPUTS -->
            <div class="lg:col-span-7 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-lg border-t-2 border-cyan-500">
                        <p class="text-[10px] uppercase text-slate-500">Should-Cost</p>
                        <h2 id="dispCost" class="text-4xl font-bold orbitron text-white">$0.00</h2>
                    </div>
                    <div class="glass p-8 rounded-lg border-t-2 border-rose-500">
                        <p class="text-[10px] uppercase text-slate-500">Margin</p>
                        <h2 id="dispMargin" class="text-4xl font-bold orbitron text-rose-500">0.0%</h2>
                    </div>
                </div>

                <div class="glass p-6 rounded-lg">
                    <h4 class="text-[10px] uppercase text-slate-500 mb-4">Landed Cost Allocation</h4>
                    <div class="h-48"><canvas id="mainChart"></canvas></div>
                </div>

                <div class="glass p-6 rounded-lg">
                    <h4 class="text-[10px] uppercase text-slate-500 mb-4">Market Index Feed</h4>
                    <div id="marketFeed" class="space-y-2 text-[10px]"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB = {
            mats: [
                {id:'al', name:'Aluminum 6061', p:2.48, u:'kg'},
                {id:'ti', name:'Titanium Gr5', p:22.50, u:'kg'},
                {id:'ss', name:'Stainless 304', p:4.80, u:'kg'},
                {id:'pk', name:'PEEK Plastic', p:95.00, u:'kg'}
            ],
            procs: [
                {id:'cnc', name:'5-Axis CNC Milling', r:120, u:'hr'},
                {id:'mold', name:'Injection Molding', r:45, u:'hr'},
                {id:'ano', name:'Anodizing', r:15, u:'unit'}
            ],
            jobs: [
                {id:'eng', name:'Engineer', r:95},
                {id:'mac', name:'Machinist', r:65},
                {id:'wld', name:'Welder', r:55}
            ],
            cities: [
                {name:'Shenzhen, China', lat:22.5, lon:114.0, idx:0.18, c:'CN'},
                {name:'Austin, USA', lat:30.2, lon:-97.7, idx:1.0, c:'US'},
                {name:'Monterrey, Mexico', lat:25.6, lon:-100.3, idx:0.25, c:'MX'},
                {name:'Ho Chi Minh, Vietnam', lat:10.8, lon:106.6, idx:0.10, c:'VN'}
            ]
        };

        let activeOrig = DB.cities[0], activeDest = DB.cities[1], chart = null;

        function addMaterialRow() {
            const div = document.createElement('div');
            div.className = 'grid grid-cols-12 gap-2 row-item';
            div.innerHTML = `
                <select class="col-span-6 input-dark" onchange="runCalc()">
                    ${DB.mats.map(m=>\`<option value="\${m.id}">\${m.name}</option>\`).join('')}
                </select>
                <div class="col-span-3"><input type="number" class="w-full input-dark" value="2" oninput="runCalc()"><label class="text-[7px] block">KG</label></div>
                <div class="col-span-3"><input type="number" class="w-full input-dark" value="1" oninput="runCalc()"><label class="text-[7px] block">QTY</label></div>`;
            document.getElementById('matContainer').appendChild(div);
            runCalc();
        }

        function addProcessRow() {
            const div = document.createElement('div');
            div.className = 'grid grid-cols-12 gap-2 row-item';
            div.innerHTML = `
                <select class="col-span-6 input-dark" onchange="runCalc()">
                    ${DB.procs.map(p=>\`<option value="\${p.id}">\${p.name}</option>\`).join('')}
                </select>
                <div class="col-span-6"><input type="number" class="w-full input-dark" value="5" oninput="runCalc()"><label class="text-[7px] block">HR/UNIT</label></div>`;
            document.getElementById('procContainer').appendChild(div);
            runCalc();
        }

        function addLaborRow() {
            const div = document.createElement('div');
            div.className = 'grid grid-cols-12 gap-2 row-item';
            div.innerHTML = `
                <div class="col-span-5 relative">
                    <input type="text" class="w-full input-dark city-in" placeholder="City Search..." oninput="doSearch(this, 'row')">
                    <div class="search-results hidden"></div>
                </div>
                <select class="col-span-4 input-dark" onchange="runCalc()">
                    ${DB.jobs.map(j=>\`<option value="\${j.id}">\${j.name}</option>\`).join('')}
                </select>
                <div class="col-span-3"><input type="number" class="w-full input-dark" value="2" oninput="runCalc()"><label class="text-[7px] block">HOURS</label></div>`;
            document.getElementById('labContainer').appendChild(div);
            runCalc();
        }

        function doSearch(input, type) {
            const v = input.value.toLowerCase();
            const resBox = input.nextElementSibling;
            if (!v) { resBox.classList.add('hidden'); return; }
            const hits = DB.cities.filter(c => c.name.toLowerCase().includes(v));
            resBox.innerHTML = hits.map(c => \`<div class="search-item" onclick="setCity('\${c.name}', '\${type}', this)">\${c.name}</div>\`).join('');
            resBox.classList.remove('hidden');
        }

        function setCity(name, type, el) {
            const c = DB.cities.find(x => x.name === name);
            if (type === 'orig') { activeOrig = c; document.getElementById('originInp').value = name; }
            else if (type === 'dest') { activeDest = c; document.getElementById('destInp').value = name; }
            else { 
                const inp = el.parentElement.previousElementSibling; 
                inp.value = name; 
                inp.dataset.idx = c.idx;
            }
            el.parentElement.classList.add('hidden');
            runCalc();
        }

        function runCalc() {
            let mCost = 0, weight = 0, lastM = "";
            document.querySelectorAll('#matContainer .row-item').forEach(r => {
                const m = DB.mats.find(x => x.id === r.querySelector('select').value);
                const w = parseFloat(r.querySelectorAll('input')[0].value) || 0;
                const q = parseFloat(r.querySelectorAll('input')[1].value) || 0;
                mCost += m.p * w * q; weight += w * q;
                lastM = m.name + ": $" + m.p + "/kg";
            });

            let pCost = 0, lastP = "";
            document.querySelectorAll('#procContainer .row-item').forEach(r => {
                const p = DB.procs.find(x => x.id === r.querySelector('select').value);
                const h = parseFloat(r.querySelector('input').value) || 0;
                pCost += p.r * h;
                lastP = p.name + ": $" + p.r + "/hr";
            });

            let lCost = 0, lastL = "";
            document.querySelectorAll('#labContainer .row-item').forEach(r => {
                const idx = parseFloat(r.querySelector('.city-in').dataset.idx) || 1.0;
                const j = DB.jobs.find(x => x.id === r.querySelector('select').value);
                const h = parseFloat(r.querySelectorAll('input')[1].value) || 0;
                lCost += (j.r * idx) * h;
                lastL = j.name + ": $" + (j.r * idx).toFixed(2) + "/hr";
            });

            let freight = 0, lastLog = "";
            if (activeOrig && activeDest) {
                const d = getDist(activeOrig.lat, activeOrig.lon, activeDest.lat, activeDest.lon);
                const mode = document.getElementById('shipMode').value;
                const rate = { boat: 0.002, air: 0.12, truck: 0.04 }[mode];
                freight = d * weight * rate;
                lastLog = mode.toUpperCase() + ": $" + rate + "/kg-km";
            }

            const sub = mCost + pCost + lCost + freight;
            const tAmt = sub * (parseFloat(document.getElementById('tRate').value) / 100);
            const total = sub + tAmt;

            document.getElementById('dispCost').innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
            const q = parseFloat(document.getElementById('sQuote').value) || 0;
            const margin = q > 0 ? ((q - total) / q) * 100 : 0;
            document.getElementById('dispMargin').innerText = margin.toFixed(1) + '%';
            
            updateChart(mCost, pCost, lCost, freight, tAmt);
            document.getElementById('marketFeed').innerHTML = \`
                <div class="flex justify-between border-b border-white/10 pb-1"><span>MATERIAL</span><span class="text-cyan-400">\${lastM}</span></div>
                <div class="flex justify-between border-b border-white/10 pb-1"><span>PROCESS</span><span class="text-pink-400">\${lastP}</span></div>
                <div class="flex justify-between border-b border-white/10 pb-1"><span>LABOR</span><span class="text-green-400">\${lastL}</span></div>
                <div class="flex justify-between"><span>FREIGHT</span><span class="text-amber-400">\${lastLog}</span></div>\`;
        }

        function getDist(la1, lo1, la2, lo2) {
            const p = Math.PI/180;
            const a = 0.5 - Math.cos((la2-la1)*p)/2 + Math.cos(la1*p)*Math.cos(la2*p)*(1-Math.cos((lo2-lo1)*p))/2;
            return 12742 * Math.asin(Math.sqrt(a));
        }

        function updateChart(m, p, l, f, t) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Material', 'Process', 'Labor', 'Freight', 'Tariff'],
                    datasets: [{ data:[m,p,l,f,t], backgroundColor:['#00f3ff','#ff00f7','#39ff14','#f59e0b','#64748b'] }]
                },
                options: { cutout: '75%', plugins: { legend: { display: true, position: 'right', labels: { color: '#64748b', font: { size: 9 } } } } }
            });
        }

        window.onload = () => { addMaterialRow(); addProcessRow(); addLaborRow(); runCalc(); };
    </script>
</body>
</html>
